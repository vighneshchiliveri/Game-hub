<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game-Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Game-Hub</h1>
        <input type="text" id="search-bar" placeholder="Search games...">
    </header>

    <div class="filters">
        <button class="filter-btn active" onclick="filterGames('all')">All Games</button>
        <button class="filter-btn" onclick="filterGames('board')">Board</button>
        <button class="filter-btn" onclick="filterGames('puzzle')">Puzzle</button>
        <button class="filter-btn" onclick="filterGames('action')">Action</button>
    </div>

    <div class="game-grid" id="game-grid">
        <a href="chess.html" class="game-card" data-category="board">
            <div class="game-image">♟️</div>
            <div class="game-info">
                <h2 class="game-title">Simple Chess</h2>
                <span class="game-category">Board</span>
            </div>
        </a>

        <a href="#" class="game-card" data-category="puzzle">
            <div class="game-image">🧩</div>
            <div class="game-info">
                <h2 class="game-title">2048 Clone</h2>
                <span class="game-category">Puzzle</span>
            </div>
        </a>

        <a href="#" class="game-card" data-category="action">
            <div class="game-image">🐍</div>
            <div class="game-info">
                <h2 class="game-title">Retro Snake</h2>
                <span class="game-category">Action</span>
            </div>
        </a>

        <a href="#" class="game-card" data-category="board">
            <div class="game-image">❌⭕</div>
            <div class="game-info">
                <h2 class="game-title">Tic-Tac-Toe</h2>
                <span class="game-category">Board</span>
            </div>
        </a>
        
        <div id="no-results" class="no-results">No games found. Try another search!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
