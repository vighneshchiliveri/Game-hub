<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Chess · Game-Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chess.css">
<link rel="stylesheet" href="chess-desktop.css">
<link rel="stylesheet" href="chess-mobile.css">
</head>
<body>

  <div class="backdrop" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="top-bar">
    <a class="back-link" href="index.html">← Back to shelf</a>
  </div>

  <div class="game-container">
    <h1>Simple Chess</h1>
    <p class="subtitle">Tap a piece, then tap a square to move it.</p>
    <div id="chessboard"></div>
    <p class="hint">No rules enforced — free movement, just like the original.</p>
  </div>

<script>
const boardElement = document.getElementById('chessboard');

// Unicode chess pieces
const pieces = {
  'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', // Black pieces
  'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'  // White pieces
};

// Initial board setup (uppercase = White, lowercase = Black, empty = null)
const initialBoard = [
  ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
  ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
  ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
];

let selectedSquare = null;

function createBoard() {
  boardElement.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement('div');
      square.dataset.row = row;
      square.dataset.col = col;

      const isLight = (row + col) % 2 === 0;
      square.classList.add('square', isLight ? 'light' : 'dark');

      const pieceKey = initialBoard[row][col];
      if (pieceKey) {
        const pieceSpan = document.createElement('span');
        pieceSpan.classList.add('piece');
        pieceSpan.textContent = pieces[pieceKey];
        pieceSpan.style.color = pieceKey === pieceKey.toUpperCase() ? '#fff' : '#0a0e14';
        if (pieceKey === pieceKey.toUpperCase()) {
          pieceSpan.style.textShadow = "0px 0px 3px rgba(0,0,0,0.6)";
        }
        square.appendChild(pieceSpan);
      }

      square.addEventListener('click', handleSquareClick);
      boardElement.appendChild(square);
    }
  }
}

function handleSquareClick(event) {
  const clickedSquare = event.currentTarget;
  const row = parseInt(clickedSquare.dataset.row);
  const col = parseInt(clickedSquare.dataset.col);
  const hasPiece = initialBoard[row][col] !== '';

  if (selectedSquare) {
    const selectedRow = parseInt(selectedSquare.dataset.row);
    const selectedCol = parseInt(selectedSquare.dataset.col);

    if (selectedRow === row && selectedCol === col) {
      selectedSquare.classList.remove('selected');
      selectedSquare = null;
      return;
    }

    initialBoard[row][col] = initialBoard[selectedRow][selectedCol];
    initialBoard[selectedRow][selectedCol] = '';

    selectedSquare.classList.remove('selected');
    selectedSquare = null;
    createBoard();
  } else {
    if (hasPiece) {
      selectedSquare = clickedSquare;
      clickedSquare.classList.add('selected');
    }
  }
}

createBoard();
</script>
</body>
</html>
