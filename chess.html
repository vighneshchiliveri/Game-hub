<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Chess · Game-Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #12182b;
    --panel-2: #161d33;
    --line: rgba(255, 255, 255, 0.08);
    --text: #f5f3ff;
    --text-muted: #8b93a8;
    --accent: #7c5cff;
    --accent-soft: rgba(124, 92, 255, 0.18);
    --teal: #00e5b8;
    --font-display: "Rajdhani", "Inter", sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    animation: drift 18s ease-in-out infinite;
  }
  .glow-a { width: 480px; height: 480px; top: -160px; left: -140px; background: var(--accent); }
  .glow-b { width: 420px; height: 420px; bottom: -160px; right: -120px; background: var(--teal); animation-delay: -9s; }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px,-30px) scale(1.08); }
  }

  .top-bar {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    transition: color 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .back-link:hover {
    color: var(--text);
    border-color: rgba(124,92,255,0.4);
    transform: translateX(-2px);
  }

  .game-container {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: rise 0.6s var(--ease) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.01em;
    margin: 0 0 4px;
  }

  .subtitle {
    margin: 0 0 22px;
    color: var(--text-muted);
    font-size: 14px;
  }

  #chessboard {
    display: grid;
    grid-template-columns: repeat(8, minmax(38px, 70px));
    grid-template-rows: repeat(8, minmax(38px, 70px));
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,92,255,0.08);
  }

  .square {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(22px, 5vw, 44px);
    cursor: pointer;
    user-select: none;
    transition: background-color 0.18s var(--ease);
    position: relative;
  }

  .light { background-color: #2a3350; }
  .dark { background-color: #161c30; }

  .square:hover {
    box-shadow: inset 0 0 0 2px var(--teal);
  }

  .selected {
    background-color: var(--accent) !important;
    box-shadow: inset 0 0 0 2px var(--teal);
  }

  .piece {
    pointer-events: none;
    transition: transform 0.18s var(--ease);
  }

  .square:hover .piece {
    transform: scale(1.08);
  }

  .hint {
    margin-top: 18px;
    color: var(--text-muted);
    font-size: 13px;
  }
</style>
</head>
<body>

  <div class="backdrop" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="top-bar">
    <a class="back-link" href="index.html">← Back to shelf</a>
  </div>

  <div class="game-container">
    <h1>Simple Chess</h1>
    <p class="subtitle">Tap a piece, then tap a square to move it.</p>
    <div id="chessboard"></div>
    <p class="hint">No rules enforced — free movement, just like the original.</p>
  </div>

<script>
const boardElement = document.getElementById('chessboard');

// Unicode chess pieces
const pieces = {
  'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', // Black pieces
  'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'  // White pieces
};

// Initial board setup (uppercase = White, lowercase = Black, empty = null)
const initialBoard = [
  ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
  ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['', '', '', '', '', '', '', ''],
  ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
  ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
];

let selectedSquare = null;

function createBoard() {
  boardElement.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement('div');
      square.dataset.row = row;
      square.dataset.col = col;

      const isLight = (row + col) % 2 === 0;
      square.classList.add('square', isLight ? 'light' : 'dark');

      const pieceKey = initialBoard[row][col];
      if (pieceKey) {
        const pieceSpan = document.createElement('span');
        pieceSpan.classList.add('piece');
        pieceSpan.textContent = pieces[pieceKey];
        pieceSpan.style.color = pieceKey === pieceKey.toUpperCase() ? '#fff' : '#0a0e14';
        if (pieceKey === pieceKey.toUpperCase()) {
          pieceSpan.style.textShadow = "0px 0px 3px rgba(0,0,0,0.6)";
        }
        square.appendChild(pieceSpan);
      }

      square.addEventListener('click', handleSquareClick);
      boardElement.appendChild(square);
    }
  }
}

function handleSquareClick(event) {
  const clickedSquare = event.currentTarget;
  const row = parseInt(clickedSquare.dataset.row);
  const col = parseInt(clickedSquare.dataset.col);
  const hasPiece = initialBoard[row][col] !== '';

  if (selectedSquare) {
    const selectedRow = parseInt(selectedSquare.dataset.row);
    const selectedCol = parseInt(selectedSquare.dataset.col);

    if (selectedRow === row && selectedCol === col) {
      selectedSquare.classList.remove('selected');
      selectedSquare = null;
      return;
    }

    initialBoard[row][col] = initialBoard[selectedRow][selectedCol];
    initialBoard[selectedRow][selectedCol] = '';

    selectedSquare.classList.remove('selected');
    selectedSquare = null;
    createBoard();
  } else {
    if (hasPiece) {
      selectedSquare = clickedSquare;
      clickedSquare.classList.add('selected');
    }
  }
}

createBoard();
</script>
</body>
</html>
