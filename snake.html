<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Snake · Game-Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #12182b;
    --panel-2: #161d33;
    --line: rgba(255, 255, 255, 0.08);
    --text: #f5f3ff;
    --text-muted: #8b93a8;
    --accent: #7c5cff;
    --accent-soft: rgba(124, 92, 255, 0.18);
    --teal: #00e5b8;
    --teal-soft: rgba(0, 229, 184, 0.16);
    --danger: #ff5c7c;
    --font-display: "Rajdhani", "Inter", sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 28px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .backdrop { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: drift 18s ease-in-out infinite; }
  .glow-a { width: 480px; height: 480px; top: -160px; left: -140px; background: var(--accent); }
  .glow-b { width: 420px; height: 420px; bottom: -160px; right: -120px; background: var(--teal); animation-delay: -9s; }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px,-30px) scale(1.08); }
  }

  .top-bar {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    transition: color 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .back-link:hover {
    color: var(--text);
    border-color: rgba(124,92,255,0.4);
    transform: translateX(-2px);
  }

  .game-container {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: rise 0.6s var(--ease) both;
    width: 100%;
    max-width: 480px;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.01em;
    margin: 0 0 4px;
  }

  .subtitle {
    margin: 0 0 16px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .hud {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-bottom: 14px;
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .hud span.value {
    color: var(--teal);
    font-weight: 700;
  }

  .board-wrap {
    position: relative;
    display: inline-block;
    border-radius: 16px;
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,92,255,0.08);
  }

  canvas {
    display: block;
    border-radius: 10px;
    background:
      linear-gradient(180deg, rgba(124,92,255,0.04), transparent 40%),
      var(--panel-2);
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 10px;
    border-radius: 10px;
    background: rgba(10, 14, 20, 0.82);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s var(--ease);
  }

  .overlay.is-visible {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
  }

  .overlay-title.is-over { color: var(--danger); }

  .overlay-sub {
    color: var(--text-muted);
    font-size: 13px;
    margin: -8px 0 0;
  }

  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    color: var(--bg);
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 10px 22px;
    cursor: pointer;
    transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-soft);
  }

  .btn.ghost {
    background: var(--panel);
    color: var(--text);
    border-color: var(--line);
  }

  .controls-row {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }

  /* Touch D-pad, shown on small / touch screens */
  .dpad {
    display: none;
    position: relative;
    z-index: 1;
    margin-top: 18px;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
    justify-content: center;
  }

  .dpad-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s var(--ease), transform 0.15s var(--ease);
  }

  .dpad-btn:active {
    background: var(--accent-soft);
    transform: scale(0.94);
  }

  .dpad-up { grid-column: 2; grid-row: 1; }
  .dpad-left { grid-column: 1; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }
  .dpad-down { grid-column: 2; grid-row: 3; }

  @media (hover: none) and (pointer: coarse) {
    .dpad { display: grid; }
  }

  .hint {
    margin-top: 14px;
    color: var(--text-muted);
    font-size: 12.5px;
  }
</style>
</head>
<body>

  <div class="backdrop" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="top-bar">
    <a class="back-link" href="index.html">← Back to shelf</a>
  </div>

  <div class="game-container">
    <h1>Retro Snake</h1>
    <p class="subtitle">Arrow keys or WASD to steer. Eat, grow, don't double back.</p>

    <div class="hud">
      <span>Score <span class="value" id="score">0</span></span>
      <span>Best <span class="value" id="best">0</span></span>
    </div>

    <div class="board-wrap">
      <canvas id="game" width="400" height="400"></canvas>

      <div class="overlay is-visible" id="overlay">
        <p class="overlay-title" id="overlay-title">Ready?</p>
        <p class="overlay-sub" id="overlay-sub">Press a direction key or tap Start</p>
        <button class="btn" id="overlay-btn">Start</button>
      </div>
    </div>

    <div class="controls-row">
      <button class="btn ghost" id="pause-btn">Pause</button>
      <button class="btn ghost" id="restart-btn">Restart</button>
    </div>

    <div class="dpad" aria-hidden="true">
      <div class="dpad-btn dpad-up" data-dir="up">▲</div>
      <div class="dpad-btn dpad-left" data-dir="left">◀</div>
      <div class="dpad-btn dpad-right" data-dir="right">▶</div>
      <div class="dpad-btn dpad-down" data-dir="down">▼</div>
    </div>

    <p class="hint">Swipe on the board also works on touch devices.</p>
  </div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const GRID = 20;                 // 20x20 cells
  const CELL = canvas.width / GRID; // pixel size per cell
  const STEP_MS_START = 140;
  const STEP_MS_MIN = 70;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub = document.getElementById('overlay-sub');
  const overlayBtn = document.getElementById('overlay-btn');
  const pauseBtn = document.getElementById('pause-btn');
  const restartBtn = document.getElementById('restart-btn');
  const dpadButtons = document.querySelectorAll('.dpad-btn');

  let best = Number(localStorage.getItem('snake-best') || 0);
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, stepMs, running, gameOver, loopHandle, lastTime;

  function resetState() {
    snake = [
      { x: 9, y: 10 },
      { x: 8, y: 10 },
      { x: 7, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    stepMs = STEP_MS_START;
    running = false;
    gameOver = false;
    placeFood();
    scoreEl.textContent = score;
    draw();
  }

  function placeFood() {
    let candidate;
    do {
      candidate = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
    } while (snake.some(s => s.x === candidate.x && s.y === candidate.y));
    food = candidate;
  }

  function showOverlay(title, sub, btnLabel, isOver) {
    overlayTitle.textContent = title;
    overlayTitle.className = 'overlay-title' + (isOver ? ' is-over' : '');
    overlaySub.textContent = sub;
    overlayBtn.textContent = btnLabel;
    overlay.classList.add('is-visible');
  }

  function hideOverlay() {
    overlay.classList.remove('is-visible');
  }

  function startGame() {
    if (gameOver) resetState();
    running = true;
    hideOverlay();
    lastTime = performance.now();
    loopHandle = requestAnimationFrame(loop);
  }

  function pauseGame() {
    if (!running || gameOver) return;
    running = false;
    cancelAnimationFrame(loopHandle);
    showOverlay('Paused', 'Press Start to keep going', 'Resume', false);
  }

  function endGame() {
    running = false;
    gameOver = true;
    cancelAnimationFrame(loopHandle);
    if (score > best) {
      best = score;
      localStorage.setItem('snake-best', String(best));
      bestEl.textContent = best;
    }
    showOverlay('Game Over', 'Score ' + score + ' — give it another go', 'Restart', true);
  }

  function loop(time) {
    loopHandle = requestAnimationFrame(loop);
    const delta = time - lastTime;
    if (delta < stepMs) return;
    lastTime = time;
    tick();
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      endGame();
      return;
    }

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      stepMs = Math.max(STEP_MS_MIN, STEP_MS_START - score * 2);
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // food
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const pulse = 1 + 0.08 * Math.sin(performance.now() / 180);
    ctx.beginPath();
    ctx.fillStyle = '#00e5b8';
    ctx.shadowColor = 'rgba(0,229,184,0.7)';
    ctx.shadowBlur = 14;
    ctx.arc(fx, fy, (CELL / 2 - 3) * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // snake
    snake.forEach((segment, i) => {
      const isHead = i === 0;
      const x = segment.x * CELL;
      const y = segment.y * CELL;
      const pad = isHead ? 1 : 2;
      const r = 5;

      ctx.fillStyle = isHead ? '#a78bff' : '#7c5cff';
      if (isHead) {
        ctx.shadowColor = 'rgba(124,92,255,0.6)';
        ctx.shadowBlur = 10;
      }

      roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
      ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function setDirection(dx, dy) {
    // prevent reversing directly into self
    if (dx === -dir.x && dy === -dir.y) return;
    nextDir = { x: dx, y: dy };
    if (!running && !gameOver) startGame();
  }

  // keyboard controls
  window.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W':
        e.preventDefault(); setDirection(0, -1); break;
      case 'ArrowDown': case 's': case 'S':
        e.preventDefault(); setDirection(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A':
        e.preventDefault(); setDirection(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D':
        e.preventDefault(); setDirection(1, 0); break;
      case ' ':
        e.preventDefault();
        if (gameOver) { startGame(); }
        else if (running) { pauseGame(); }
        else { startGame(); }
        break;
    }
  });

  // on-screen dpad
  dpadButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const map = {
        up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0]
      };
      const [dx, dy] = map[btn.dataset.dir];
      setDirection(dx, dy);
    });
  });

  // swipe controls on the canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { touchStart = null; return; }

    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, { passive: true });

  overlayBtn.addEventListener('click', () => {
    if (gameOver) { startGame(); }
    else if (!running) { startGame(); }
  });

  pauseBtn.addEventListener('click', () => {
    if (gameOver) return;
    if (running) pauseGame(); else startGame();
  });

  restartBtn.addEventListener('click', () => {
    cancelAnimationFrame(loopHandle);
    resetState();
    showOverlay('Ready?', 'Press a direction key or tap Start', 'Start', false);
  });

  resetState();
})();
</script>
</body>
</html>
