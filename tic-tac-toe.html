<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe · Game-Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #12182b;
    --panel-2: #161d33;
    --line: rgba(255, 255, 255, 0.08);
    --text: #f5f3ff;
    --text-muted: #8b93a8;
    --accent: #7c5cff;
    --accent-soft: rgba(124, 92, 255, 0.18);
    --teal: #00e5b8;
    --teal-soft: rgba(0, 229, 184, 0.16);
    --font-display: "Rajdhani", "Inter", sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .backdrop { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: drift 18s ease-in-out infinite; }
  .glow-a { width: 480px; height: 480px; top: -160px; left: -140px; background: var(--accent); }
  .glow-b { width: 420px; height: 420px; bottom: -160px; right: -120px; background: var(--teal); animation-delay: -9s; }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px,-30px) scale(1.08); }
  }

  .top-bar {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    transition: color 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .back-link:hover {
    color: var(--text);
    border-color: rgba(124,92,255,0.4);
    transform: translateX(-2px);
  }

  .game-container {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: rise 0.6s var(--ease) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.01em;
    margin: 0 0 4px;
  }

  .subtitle {
    margin: 0 0 20px;
    color: var(--text-muted);
    font-size: 14px;
    min-height: 20px;
    transition: color 0.2s var(--ease);
  }

  .subtitle.is-win { color: var(--teal); font-weight: 600; }
  .subtitle.is-draw { color: var(--accent); font-weight: 600; }

  #board {
    display: grid;
    grid-template-columns: repeat(3, minmax(72px, 96px));
    grid-template-rows: repeat(3, minmax(72px, 96px));
    gap: 8px;
    background: var(--panel);
    padding: 8px;
    border-radius: 16px;
    border: 1px solid var(--line);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,92,255,0.08);
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-2);
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: clamp(34px, 8vw, 48px);
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.18s var(--ease), transform 0.15s var(--ease);
    position: relative;
  }

  .cell:hover {
    background: rgba(124, 92, 255, 0.12);
  }

  .cell.filled {
    cursor: default;
  }

  .cell.filled:hover {
    background: var(--panel-2);
  }

  .cell .mark {
    display: inline-block;
    animation: popIn 0.25s var(--ease) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .mark.x { color: var(--accent); text-shadow: 0 0 16px var(--accent-soft); }
  .mark.o { color: var(--teal); text-shadow: 0 0 16px var(--teal-soft); }

  .cell.win-cell {
    background: var(--accent);
    animation: winPulse 0.9s var(--ease) infinite;
  }

  .cell.win-cell .mark.x,
  .cell.win-cell .mark.o {
    color: var(--bg);
    text-shadow: none;
  }

  @keyframes winPulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-soft); }
    50% { box-shadow: 0 0 0 8px transparent; }
  }

  .controls {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 20px;
    cursor: pointer;
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease);
  }

  .btn:hover {
    border-color: rgba(124, 92, 255, 0.4);
    transform: translateY(-1px);
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }

  .btn.primary:hover {
    box-shadow: 0 6px 20px var(--accent-soft);
  }

  .score-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 18px;
    margin-top: 18px;
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .score-row span.score-x { color: var(--accent); }
  .score-row span.score-o { color: var(--teal); }
</style>
</head>
<body>

  <div class="backdrop" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="top-bar">
    <a class="back-link" href="index.html">← Back to shelf</a>
  </div>

  <div class="game-container">
    <h1>Tic-Tac-Toe</h1>
    <p class="subtitle" id="status">X's turn</p>
    <div id="board"></div>

    <div class="score-row">
      <span><span class="score-x">X</span> <span id="score-x">0</span></span>
      <span>Draws <span id="score-d">0</span></span>
      <span><span class="score-o">O</span> <span id="score-o">0</span></span>
    </div>

    <div class="controls">
      <button class="btn primary" id="reset-btn">New Round</button>
    </div>
  </div>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset-btn');
  const scoreXEl = document.getElementById('score-x');
  const scoreOEl = document.getElementById('score-o');
  const scoreDEl = document.getElementById('score-d');

  const WIN_LINES = [
    [0,1,2], [3,4,5], [6,7,8], // rows
    [0,3,6], [1,4,7], [2,5,8], // cols
    [0,4,8], [2,4,6]           // diagonals
  ];

  let cells = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;
  let scores = { X: 0, O: 0, D: 0 };

  function render() {
    boardEl.innerHTML = '';
    cells.forEach((value, i) => {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      if (value) cell.classList.add('filled');
      cell.dataset.index = i;

      if (value) {
        const mark = document.createElement('span');
        mark.classList.add('mark', value.toLowerCase());
        mark.textContent = value;
        cell.appendChild(mark);
      }

      cell.addEventListener('click', () => handleMove(i));
      boardEl.appendChild(cell);
    });
  }

  function handleMove(index) {
    if (gameOver || cells[index]) return;

    cells[index] = currentPlayer;
    render();

    const winLine = checkWin(currentPlayer);
    if (winLine) {
      gameOver = true;
      highlightWin(winLine);
      statusEl.textContent = currentPlayer + ' wins!';
      statusEl.className = 'subtitle is-win';
      scores[currentPlayer] += 1;
      updateScores();
      return;
    }

    if (cells.every(c => c !== null)) {
      gameOver = true;
      statusEl.textContent = "It's a draw";
      statusEl.className = 'subtitle is-draw';
      scores.D += 1;
      updateScores();
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusEl.textContent = currentPlayer + "'s turn";
    statusEl.className = 'subtitle';
  }

  function checkWin(player) {
    return WIN_LINES.find(line => line.every(i => cells[i] === player)) || null;
  }

  function highlightWin(line) {
    line.forEach(i => {
      boardEl.children[i].classList.add('win-cell');
    });
  }

  function updateScores() {
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDEl.textContent = scores.D;
  }

  function newRound() {
    cells = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    statusEl.textContent = "X's turn";
    statusEl.className = 'subtitle';
    render();
  }

  resetBtn.addEventListener('click', newRound);

  render();
</script>
</body>
</html>
